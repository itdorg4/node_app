name: sequential jobs

on: workflow_dispatch

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: job1
              run: exit 1
    job2:
        needs: job1
        if: ${{ always() }}
        runs-on: ubuntu-latest
        steps:
            - name: job2
              run: sleep 3
    job3:
        needs: job2
        if: ${{ always() }}
        runs-on: ubuntu-latest
        steps:
            - name: job3
              run: sleep 3